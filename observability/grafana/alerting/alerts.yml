api_latency_p95:
  title: "API latency p95 breaching"
  condition: "histogram_quantile(0.95, sum(rate(phase_runner_api_request_duration_seconds_bucket[5m])) by (le)) > 1"
  for: 10m
  annotations:
    summary: "API latency p95 above 1s"
    runbook: "https://runbooks.phase-runner.local/api-latency"

etl_throughput_drop:
  title: "ETL throughput drop"
  condition: "phase_runner_etl_throughput_records < 1200"
  for: 15m
  annotations:
    summary: "ETL throughput below SLO"
    runbook: "https://runbooks.phase-runner.local/etl-throughput"

error_budget_burn:
  title: "Error budget burn >= 4"
  condition: "sum(increase(phase_runner_error_budget_burn_total[1h])) >= 4"
  for: 5m
  annotations:
    summary: "Error budget burn is unsustainable"
    runbook: "https://runbooks.phase-runner.local/error-budget"
