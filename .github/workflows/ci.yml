name: App CI

on:
  pull_request:
    paths:
      - 'app/**'
      - 'lib/**'
      - 'pages/**'
      - 'tests/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
      - 'next.config.js'
      - 'otel.ts'
      - 'instrumentation.ts'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run lint
        env:
          AUTH_DISABLED: 'true'
      - run: npm run build
        env:
          AUTH_DISABLED: 'true'
      - run: npx playwright install --with-deps
      - run: npm test
        env:
          AUTH_DISABLED: 'true'
